<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <div>
          <input type="text" name="location" id="searchLocation" />

          <button id="searchBtn">&#9730;</button>
        </div>
      </div>

      <div class="main">
        <div class="dayForecast">
          <div data-item="1">
            <div id="imgAndTemp"></div>
            <div id="nameAndDate"></div>
          </div>
          <div data-item="2" id="description"></div>
          <div data-item="4" id="day"></div>
        </div>

        <div class="weekForecast"></div>
      </div>
    </div>

    <script src="bundle.js"></script>
  </body>
</html>
