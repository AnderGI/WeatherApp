<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
  </head>
  <body>
    <div class="container">
      <div class="header">
        <label for="searchLocation">
          Look for city (just Spain for now):
          <br />
          <input type="text" name="location" id="searchLocation" />
        </label>
        <br />
        <button id="searchBtn">Look for it</button>
      </div>

      <div class="main">
        <div class="dayForecast">
          <div data-item="1">
            <div id="imgAndTemp">

            </div>
            <div id="nameAndDate">
              
            </div>
          </div>
          <div data-item="2" id="description"></div>
          <div data-item="4" id="day">

          </div>
        </div>

        <div class="weekForecast">
          <div data-item="1"></div>
          <div data-item="2"></div>
          <div data-item="3"></div>
          <div data-item="4"></div>
        </div>
      </div>
    </div>

    <script src="bundle.js"></script>
  </body>
</html>
